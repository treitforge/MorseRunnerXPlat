name: Native Release Evidence

on:
  workflow_dispatch:
    inputs:
      attempt_physical_audio:
        description: Attempt playback, device recovery, and physical WAV capture
        required: true
        type: boolean
        default: false
      require_physical_audio:
        description: Fail unless physical audio and a device change pass
        required: true
        type: boolean
        default: false
  pull_request:
    paths:
      - "global.json"
      - "Directory.*"
      - "MorseRunnerXPlat.slnx"
      - "proto/**"
      - "src/**"
      - "tests/**"
      - "tools/parity/**"
      - "tools/release/**"
      - "LICENSE"
      - "README.md"
      - "THIRD-PARTY-NOTICES.md"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".gitattributes"
      - ".gitignore"
      - ".github/workflows/release-evidence.yml"
      - ".github/workflows/release-quality.yml"
  push:
    tags:
      - "v*"

concurrency:
  group: native-release-evidence-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  live-parity:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout public legacy base
        uses: actions/checkout@v5
        with:
          repository: w7sst/MorseRunner
          ref: 2dd6f5cfd8a96e00f472d189adae594823ae5b61
          path: artifacts/legacy-source/MorseRunner
          persist-credentials: false

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5.4.0
        with:
          global-json-file: global.json

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Restore
        run: |
          uv sync --locked
          dotnet restore MorseRunnerXPlat.slnx

      - name: Cache pinned Lazarus toolchain
        uses: actions/cache@v4
        with:
          path: C:\lazarus
          key: lazarus-4.6-fpc-3.2.2-win64-3eb50f2aac396bac

      - name: Verify pinned legacy toolchain
        shell: pwsh
        run: .\tests\parity\Install-LegacyOracleToolchain.ps1

      - name: Run live parity prerequisite
        shell: pwsh
        run: |
          $mode = if ('${{ github.ref_type }}' -eq 'tag') {
            'Release'
          }
          elseif ('${{ github.event_name }}' -eq 'pull_request') {
            $env:MORSE_RUNNER_PARITY_HISTORY_KIND = 'pull-request'
            $env:MORSE_RUNNER_PARITY_BASE_REVISION = `
              '${{ github.event.pull_request.base.sha }}'
            'PullRequest'
          }
          else {
            'Development'
          }
          try {
            .\tests\parity\Run-Parity.ps1 `
              -Target Both `
              -Mode $mode `
              -LegacyRoot '${{ github.workspace }}\artifacts\legacy-source\MorseRunner'
          }
          finally {
            Remove-Item Env:MORSE_RUNNER_PARITY_HISTORY_KIND `
              -ErrorAction SilentlyContinue
            Remove-Item Env:MORSE_RUNNER_PARITY_BASE_REVISION `
              -ErrorAction SilentlyContinue
          }

      - name: Stage complete live parity artifact closure
        id: live-parity-artifacts
        if: success()
        shell: pwsh
        run: |
          $registries = @(
            Get-ChildItem `
              -LiteralPath artifacts/legacy-oracle/registries `
              -Filter '*.json' -File)
          if ($registries.Count -ne 1) {
            throw (
              'The native-evidence Both gate must produce exactly one ' +
              'legacy oracle registry.')
          }
          $registry = $registries[0]
          $registryHash = (
            Get-FileHash -LiteralPath $registry.FullName `
              -Algorithm SHA256).Hash.ToLowerInvariant()
          $package = .\tests\parity\New-ParityBothArtifactPackage.ps1 `
            -PackageRoot `
              'artifacts/parity-package-staging/native-evidence-both' `
            -RegistryPath $registry.FullName `
            -RegistrySha256 $registryHash `
            -PassThru
          "package_root=$($package.packageRoot)" >> $env:GITHUB_OUTPUT
          "package_index_sha256=$($package.indexSha256)" >> $env:GITHUB_OUTPUT

      - name: Upload live parity provenance and results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: >-
            native-evidence-live-parity-${{ github.run_id }}-${{
            github.run_attempt }}-${{
            steps.live-parity-artifacts.outputs.package_index_sha256 }}
          path: ${{ steps.live-parity-artifacts.outputs.package_root }}
          if-no-files-found: error
          retention-days: 30

  native-evidence:
    needs: live-parity
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive_extension: .zip
          - os: ubuntu-latest
            rid: linux-x64
            archive_extension: .tar.gz
          - os: macos-15-intel
            rid: osx-x64
            archive_extension: .tar.gz
          - os: macos-15
            rid: osx-arm64
            archive_extension: .tar.gz
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5.4.0
        with:
          global-json-file: global.json

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        shell: pwsh
        run: |
          sudo apt-get update
          sudo apt-get install --yes xvfb

      - name: Restore and build
        shell: pwsh
        run: |
          uv sync --locked
          dotnet restore MorseRunnerXPlat.slnx
          dotnet build MorseRunnerXPlat.slnx `
            --configuration Release --no-restore

      - name: Run applicable native XPlat parity cases
        shell: pwsh
        run: |
          $platform = if ($IsWindows) {
            'windows'
          }
          elseif ($IsLinux) {
            'linux'
          }
          else {
            'macos'
          }
          $manifest = Get-Content `
            -LiteralPath tests/parity/parity-manifest.json `
            -Raw |
            ConvertFrom-Json
          $applicable = @(
            $manifest.cases |
              Where-Object { $_.platforms -contains $platform })
          if ($applicable.Count -eq 0) {
            Write-Host "No active parity cases apply to $platform."
          }
          else {
            .\tests\parity\Run-Parity.ps1 `
              -Target XPlat `
              -Mode Development
          }

      - name: Capture interaction and visual evidence
        shell: pwsh
        env:
          MORSE_RUNNER_PARITY_TARGET: XPlat
          MORSE_RUNNER_VISUAL_EVIDENCE_DIR: >-
            ${{ github.workspace }}/artifacts/visual/${{ matrix.rid }}
        run: |
          dotnet test `
            --project tests/MorseRunner.App.Tests/MorseRunner.App.Tests.csproj `
            --configuration Release --no-build
          dotnet test `
            --project tests/MorseRunner.Tui.Tests/MorseRunner.Tui.Tests.csproj `
            --configuration Release --no-build

      - name: Publish target-native archive
        shell: pwsh
        run: |
          .\tools\release\Publish-Release.ps1 `
            -RuntimeIdentifiers @('${{ matrix.rid }}')

      - name: Install and launch archive
        shell: pwsh
        run: |
          $xvfb = $null
          try {
            if ($IsLinux) {
              $xvfb = Start-Process `
                -FilePath 'Xvfb' `
                -ArgumentList ':99 -screen 0 1280x1024x24' `
                -PassThru
              $env:DISPLAY = ':99'
              Start-Sleep -Seconds 1
            }

            $parameters = @{
              RuntimeIdentifier = '${{ matrix.rid }}'
              ArchivePath = 'artifacts/release/MorseRunnerXPlat-${{ matrix.rid }}${{ matrix.archive_extension }}'
              EvidenceRoot = 'artifacts/evidence/${{ matrix.rid }}'
            }
            $attemptPhysicalAudio =
              '${{ github.event_name }}' -eq 'pull_request' -or
              '${{ github.ref_type }}' -eq 'tag' -or
              '${{ inputs.attempt_physical_audio }}' -eq 'true'
            if ($attemptPhysicalAudio) {
              $parameters.AttemptPhysicalAudio = $true
            }
            $requirePhysicalAudio =
              '${{ github.ref_type }}' -eq 'tag' -or
              '${{ inputs.require_physical_audio }}' -eq 'true'
            if ($requirePhysicalAudio) {
              $parameters.RequirePhysicalAudio = $true
            }

            .\tools\release\Test-ReleaseArchive.ps1 @parameters
          }
          finally {
            if ($null -ne $xvfb -and -not $xvfb.HasExited) {
              Stop-Process -Id $xvfb.Id -Force
            }
          }

      - name: Upload native evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-evidence-${{ matrix.rid }}
          path: |
            artifacts/evidence/${{ matrix.rid }}
            artifacts/visual/${{ matrix.rid }}
          if-no-files-found: warn
          retention-days: 30

      - name: Upload native XPlat parity results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: native-parity-${{ matrix.rid }}
          path: |
            artifacts/parity/xplat.json
            artifacts/parity/test-results/xplat.trx
            artifacts/parity/executions/xplat/*.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload tested archive
        uses: actions/upload-artifact@v4
        with:
          name: native-archive-${{ matrix.rid }}
          path: artifacts/release/MorseRunnerXPlat-${{ matrix.rid }}${{ matrix.archive_extension }}
          if-no-files-found: error
          retention-days: 14
