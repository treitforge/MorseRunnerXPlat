name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - ".python-version"
      - "global.json"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - ".python-version"
      - "global.json"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5.4.0
        with:
          global-json-file: global.json

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize Python tooling
        run: uv sync --locked

      - name: Verify developer tools
        run: |
          dotnet --info
          pwsh --version
          uv --version
          uv run --locked python -c "import yaml; print(yaml.__version__)"
