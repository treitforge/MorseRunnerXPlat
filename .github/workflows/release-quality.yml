name: Release quality

on:
  workflow_dispatch:

jobs:
  release-quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore MorseRunnerXPlat.slnx
      - run: dotnet build MorseRunnerXPlat.slnx --no-restore --configuration Release
      - run: dotnet test --solution MorseRunnerXPlat.slnx --no-build --configuration Release
      - run: .\tools\release\Publish-Release.ps1
