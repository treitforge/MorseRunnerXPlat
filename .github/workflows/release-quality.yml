name: Release quality

on:
  workflow_dispatch:

jobs:
  release-quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore MorseRunnerXPlat.slnx
      - run: dotnet build MorseRunnerXPlat.slnx --no-restore --configuration Release -warnaserror
      - run: dotnet test --solution MorseRunnerXPlat.slnx --no-build --configuration Release -- --fail-warns on
        env:
          DOTNET_TieredCompilation: 0
      - run: .\tools\release\Publish-Release.ps1
