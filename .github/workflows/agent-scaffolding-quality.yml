name: Agent Scaffolding Quality

on:
  workflow_dispatch:
  push:
    paths:
      - "AGENTS.md"
      - ".agents/**"
      - ".codex/**"
      - ".github/agents/**"
      - ".github/hooks/**"
      - ".github/instructions/**"
      - ".github/prompts/**"
      - ".github/skills/**"
      - "docs/architecture/**"
      - ".python-version"
      - "pyproject.toml"
      - "uv.lock"
      - "tools/agent_scaffolding/**"
  pull_request:
    paths:
      - "AGENTS.md"
      - ".agents/**"
      - ".codex/**"
      - ".github/agents/**"
      - ".github/hooks/**"
      - ".github/instructions/**"
      - ".github/prompts/**"
      - ".github/skills/**"
      - "docs/architecture/**"
      - ".python-version"
      - "pyproject.toml"
      - "uv.lock"
      - "tools/agent_scaffolding/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize Python tooling
        run: uv sync --locked

      - name: Validate agent scaffolding
        shell: pwsh
        run: .\.github\hooks\scripts\validate-agent-scaffolding.ps1
