name: .NET quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run --locked python tools\agent_scaffolding\validate_yaml.py
      - run: .\.github\hooks\scripts\validate-agent-scaffolding.ps1
      - run: dotnet restore MorseRunnerXPlat.slnx
      - run: dotnet format MorseRunnerXPlat.slnx --verify-no-changes
      - run: dotnet build MorseRunnerXPlat.slnx --no-restore --configuration Release
      - run: dotnet test --solution MorseRunnerXPlat.slnx --no-build --configuration Release
