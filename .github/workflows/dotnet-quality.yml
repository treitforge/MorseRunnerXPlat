name: .NET Quality

on:
  workflow_dispatch:
    inputs:
      capture_green_case_ids:
        description: >-
          Optional JSON array of manifest-red case IDs to capture as
          no-mutation Baseline green evidence on all three platforms
        required: false
        type: string
        default: ""
  push:
    branches:
      - main
    paths:
      - "global.json"
      - "Directory.*"
      - "MorseRunnerXPlat.slnx"
      - "src/**"
      - "tests/**"
      - "tools/parity/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".gitattributes"
      - ".github/workflows/dotnet-quality.yml"
  pull_request:
    paths:
      - "global.json"
      - "Directory.*"
      - "MorseRunnerXPlat.slnx"
      - "src/**"
      - "tests/**"
      - "tools/parity/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".gitattributes"
      - ".github/workflows/dotnet-quality.yml"

concurrency:
  group: dotnet-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect solution
        id: solution
        shell: pwsh
        run: |
          $exists = Test-Path -LiteralPath 'MorseRunnerXPlat.slnx'
          "exists=$($exists.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          if (-not $exists) {
            Write-Host 'Solution has not been scaffolded yet; .NET checks are skipped.'
          }

      - name: Set up .NET 10
        if: steps.solution.outputs.exists == 'true'
        uses: actions/setup-dotnet@v5.4.0
        with:
          global-json-file: global.json

      - name: Install uv
        if: steps.solution.outputs.exists == 'true'
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Restore
        if: steps.solution.outputs.exists == 'true'
        run: |
          uv sync --locked
          dotnet restore MorseRunnerXPlat.slnx

      - name: Verify formatting
        if: steps.solution.outputs.exists == 'true' && matrix.os == 'ubuntu-latest'
        run: dotnet format MorseRunnerXPlat.slnx --verify-no-changes --no-restore

      - name: Build
        if: steps.solution.outputs.exists == 'true'
        run: dotnet build MorseRunnerXPlat.slnx --no-restore --configuration Release

      - name: Test
        if: steps.solution.outputs.exists == 'true'
        run: >-
          dotnet test --solution MorseRunnerXPlat.slnx
          --no-build --configuration Release --
          --filter-not-trait Category=ParityAcceptance
          --filter-not-trait Category=LegacyOracleBuildIntegration
        env:
          MORSE_RUNNER_PARITY_TARGET: XPlat
          MORSE_RUNNER_VISUAL_EVIDENCE_DIR: ${{ github.workspace }}/artifacts/visual/${{ matrix.os }}

      - name: Run applicable native XPlat parity cases
        id: native-parity
        if: steps.solution.outputs.exists == 'true'
        shell: pwsh
        env:
          CAPTURE_GREEN_CASE_IDS: ${{ inputs.capture_green_case_ids }}
        run: |
          $emitted = $false
          $captureEmitted = $false
          $platform = if ($IsWindows) {
            'windows'
          }
          elseif ($IsLinux) {
            'linux'
          }
          else {
            'macos'
          }
          $manifest = Get-Content `
            -LiteralPath tests/parity/parity-manifest.json `
            -Raw |
            ConvertFrom-Json
          $applicable = @(
            $manifest.cases |
              Where-Object { $_.platforms -contains $platform })
          if ($applicable.Count -eq 0) {
            Write-Host "No active parity cases apply to $platform."
          }
          else {
            $captureJson = $env:CAPTURE_GREEN_CASE_IDS
            $platformCaptureIds = @()
            if (-not [string]::IsNullOrWhiteSpace($captureJson)) {
              if ('${{ github.event_name }}' -ne 'workflow_dispatch') {
                throw 'Green capture input is allowed only for dispatch.'
              }
              try {
                $captureDocument =
                  [Text.Json.JsonDocument]::Parse($captureJson)
                if ($captureDocument.RootElement.ValueKind -ne
                    [Text.Json.JsonValueKind]::Array) {
                  throw 'not an array'
                }
                $captureIds = @($captureJson | ConvertFrom-Json)
              }
              catch {
                throw 'capture_green_case_ids must be a JSON array.'
              }
              finally {
                if ($null -ne $captureDocument) {
                  $captureDocument.Dispose()
                }
              }
              if ($captureIds.Count -eq 0 -or
                  @($captureIds | Where-Object {
                    $_ -isnot [string] -or
                    [string]::IsNullOrWhiteSpace($_)
                  }).Count -ne 0) {
                throw (
                  'capture_green_case_ids must be a nonempty JSON array ' +
                  'of case-ID strings.')
              }
              if (@($captureIds | Select-Object -Unique).Count -ne
                  $captureIds.Count) {
                throw 'capture_green_case_ids contains duplicates.'
              }
              foreach ($captureId in $captureIds) {
                $matches = @(
                  $manifest.cases |
                    Where-Object { $_.id -ceq $captureId })
                if ($matches.Count -ne 1 -or
                    $matches[0].status -cne
                    'legacy-green-xplat-red') {
                  throw (
                    "Green capture case '$captureId' is not one exact " +
                    'manifest-red case.')
                }
              }
              $platformCaptureIds = @(
                $captureIds |
                  Where-Object {
                    $applicable.id -ccontains $_
                  })
            }
            if ($platformCaptureIds.Count -eq 0) {
              .\tests\parity\Run-Parity.ps1 `
                -Target XPlat `
                -Mode Development
            }
            else {
              .\tests\parity\Run-Parity.ps1 `
                -Target XPlat `
                -Mode Development `
                -GreenRegressionCaseId (
                  [string[]] $platformCaptureIds)
            }
            $fullSuiteRoot = Join-Path `
              'artifacts/parity-full-suite' $platform
            New-Item -ItemType Directory -Force `
              -Path (Join-Path $fullSuiteRoot 'execution') |
              Out-Null
            Copy-Item -LiteralPath artifacts/parity/xplat.json `
              -Destination (Join-Path $fullSuiteRoot 'xplat.json')
            Copy-Item `
              -LiteralPath artifacts/parity/test-results/xplat.trx `
              -Destination (Join-Path $fullSuiteRoot 'xplat.trx')
            $fullExecution = @(
              Get-ChildItem `
                -LiteralPath artifacts/parity/executions/xplat `
                -Filter '*.json' -File)
            if ($fullExecution.Count -ne 1) {
              throw (
                'Full XPlat regression gate must emit exactly one ' +
                'execution envelope.')
            }
            Copy-Item -LiteralPath $fullExecution[0].FullName `
              -Destination (
                Join-Path `
                  (Join-Path $fullSuiteRoot 'execution') `
                  $fullExecution[0].Name)
            if ($platformCaptureIds.Count -gt 0) {
              .\tests\parity\Run-Parity.ps1 `
                -Target XPlat `
                -Mode Baseline `
                -CaptureGreenCaseId (
                  [string[]] $platformCaptureIds)
              $captureEmitted = $true
            }
            $emitted = $true
          }
          "platform=$platform" >> $env:GITHUB_OUTPUT
          "emitted=$($emitted.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "capture_emitted=$($captureEmitted.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Upload native XPlat parity results
        if: >-
          success() &&
          steps.solution.outputs.exists == 'true' &&
          steps.native-parity.outputs.emitted == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: xplat-parity-${{ matrix.os }}
          path: |
            artifacts/parity/xplat.json
            artifacts/parity/test-results/xplat.trx
            artifacts/parity/executions/xplat/*.json
            artifacts/parity-full-suite/${{ steps.native-parity.outputs.platform }}/xplat.json
            artifacts/parity-full-suite/${{ steps.native-parity.outputs.platform }}/xplat.trx
            artifacts/parity-full-suite/${{ steps.native-parity.outputs.platform }}/execution/*.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload Avalonia visual evidence
        if: steps.solution.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: avalonia-visual-${{ matrix.os }}
          path: artifacts/visual/${{ matrix.os }}/*.png
          if-no-files-found: error
          retention-days: 14

      - name: Capture TUI native snapshot
        if: steps.solution.outputs.exists == 'true'
        shell: pwsh
        run: |
          $directory = '${{ github.workspace }}/artifacts/tui/${{ matrix.os }}'
          New-Item -ItemType Directory -Force -Path $directory | Out-Null
          foreach ($view in @('operator', 'settings', 'results', 'diagnostics', 'help')) {
            dotnet run --project src/MorseRunner.Tui/MorseRunner.Tui.csproj `
              --configuration Release --no-build -- `
              --snapshot --no-audio --no-color --snapshot-view $view |
              Out-File -LiteralPath "$directory/$view.txt" -Encoding utf8
          }

      - name: Upload TUI native evidence
        if: steps.solution.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tui-native-${{ matrix.os }}
          path: artifacts/tui/${{ matrix.os }}/*.txt
          if-no-files-found: error
          retention-days: 14

      - name: Check vulnerable packages
        if: steps.solution.outputs.exists == 'true' && matrix.os == 'ubuntu-latest'
        shell: pwsh
        run: |
          $output = dotnet list MorseRunnerXPlat.slnx package --vulnerable --include-transitive 2>&1 | Out-String
          Write-Host $output
          if ($output -match 'has the following vulnerable packages') {
            throw 'Vulnerable NuGet packages detected.'
          }

  green-regression-windows-both:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.capture_green_case_ids != ''
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout public legacy base
        uses: actions/checkout@v5
        with:
          repository: w7sst/MorseRunner
          ref: 2dd6f5cfd8a96e00f472d189adae594823ae5b61
          path: artifacts/legacy-source/MorseRunner
          persist-credentials: false

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5.4.0
        with:
          global-json-file: global.json

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Restore
        run: |
          uv sync --locked
          dotnet restore MorseRunnerXPlat.slnx

      - name: Cache pinned Lazarus toolchain
        uses: actions/cache@v4
        with:
          path: C:\lazarus
          key: lazarus-4.6-fpc-3.2.2-win64-3eb50f2aac396bac

      - name: Verify pinned legacy toolchain
        shell: pwsh
        run: .\tests\parity\Install-LegacyOracleToolchain.ps1

      - name: Run complete Windows Both regression gate
        shell: pwsh
        env:
          CAPTURE_GREEN_CASE_IDS: ${{ inputs.capture_green_case_ids }}
        run: |
          $captureJson = $env:CAPTURE_GREEN_CASE_IDS
          try {
            $document = [Text.Json.JsonDocument]::Parse($captureJson)
            if ($document.RootElement.ValueKind -ne
                [Text.Json.JsonValueKind]::Array) {
              throw 'not an array'
            }
            $captureIds = @($captureJson | ConvertFrom-Json)
          }
          catch {
            throw 'capture_green_case_ids must be a JSON array.'
          }
          finally {
            if ($null -ne $document) {
              $document.Dispose()
            }
          }
          if ($captureIds.Count -eq 0 -or
              @($captureIds | Where-Object {
                $_ -isnot [string] -or
                [string]::IsNullOrWhiteSpace($_)
              }).Count -ne 0 -or
              @($captureIds | Select-Object -Unique).Count -ne
                $captureIds.Count) {
            throw (
              'capture_green_case_ids must be a nonempty unique JSON ' +
              'array of case-ID strings.')
          }
          $manifest = Get-Content `
            -LiteralPath tests/parity/parity-manifest.json `
            -Raw |
            ConvertFrom-Json
          foreach ($captureId in $captureIds) {
            $matches = @(
              $manifest.cases |
                Where-Object { $_.id -ceq $captureId })
            if ($matches.Count -ne 1 -or
                $matches[0].status -cne
                'legacy-green-xplat-red') {
              throw (
                "Green regression case '$captureId' is not one exact " +
                'manifest-red case.')
            }
          }
          $windowsIds = @(
            $captureIds |
              Where-Object {
                $id = $_
                @(
                  $manifest.cases |
                    Where-Object {
                      $_.id -ceq $id -and
                      @($_.platforms) -ccontains 'windows'
                    }).Count -eq 1
              })
          if ($windowsIds.Count -gt 0) {
            .\tests\parity\Run-Parity.ps1 `
              -Target Both `
              -Mode Development `
              -LegacyRoot '${{ github.workspace }}\artifacts\legacy-source\MorseRunner' `
              -GreenRegressionCaseId ([string[]] $windowsIds)
          }
          else {
            .\tests\parity\Run-Parity.ps1 `
              -Target Both `
              -Mode Development `
              -LegacyRoot '${{ github.workspace }}\artifacts\legacy-source\MorseRunner'
          }

      - name: Verify complete Legacy oracle artifact set
        id: legacy-oracle-artifacts
        if: success()
        shell: pwsh
        run: |
          $registries = @(
            Get-ChildItem `
              -LiteralPath artifacts/legacy-oracle/registries `
              -Filter '*.json' -File)
          if ($registries.Count -ne 1) {
            throw (
              'The Windows Both gate must produce exactly one legacy ' +
              'oracle registry.')
          }
          $registry = $registries[0]
          $registryHash = (
            Get-FileHash -LiteralPath $registry.FullName `
              -Algorithm SHA256).Hash.ToLowerInvariant()
          $package = .\tests\parity\New-ParityBothArtifactPackage.ps1 `
            -PackageRoot `
              'artifacts/parity-package-staging/windows-both' `
            -RegistryPath $registry.FullName `
            -RegistrySha256 $registryHash `
            -PassThru
          $relative = [IO.Path]::GetRelativePath(
            '${{ github.workspace }}', $registry.FullName
          ).Replace('\', '/')
          "registry=$relative" >> $env:GITHUB_OUTPUT
          "registry_sha256=$registryHash" >> $env:GITHUB_OUTPUT
          "package_root=$($package.packageRoot)" >> $env:GITHUB_OUTPUT
          "package_import_root=artifacts/parity-imports/$($package.indexSha256)" >> $env:GITHUB_OUTPUT
          "package_index=artifacts/parity-imports/$($package.indexSha256)/artifacts/parity-full-suite/windows-both-package-index/$($package.indexSha256).json" >> $env:GITHUB_OUTPUT
          "package_index_sha256=$($package.indexSha256)" >> $env:GITHUB_OUTPUT

      - name: Upload complete Windows Both regression gate
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: >-
            parity-full-suite-windows-both-${{ github.sha }}-${{
            steps.legacy-oracle-artifacts.outputs.package_index_sha256 }}
          path: ${{ steps.legacy-oracle-artifacts.outputs.package_root }}
          if-no-files-found: error
          retention-days: 30
