name: .NET Quality

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "global.json"
      - "Directory.*"
      - "MorseRunnerXPlat.slnx"
      - "src/**"
      - "tests/**"
      - ".github/workflows/dotnet-quality.yml"
  pull_request:
    paths:
      - "global.json"
      - "Directory.*"
      - "MorseRunnerXPlat.slnx"
      - "src/**"
      - "tests/**"
      - ".github/workflows/dotnet-quality.yml"

concurrency:
  group: dotnet-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect solution
        id: solution
        shell: pwsh
        run: |
          $exists = Test-Path -LiteralPath 'MorseRunnerXPlat.slnx'
          "exists=$($exists.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          if (-not $exists) {
            Write-Host 'Solution has not been scaffolded yet; .NET checks are skipped.'
          }

      - name: Set up .NET 10
        if: steps.solution.outputs.exists == 'true'
        uses: actions/setup-dotnet@v5.4.0
        with:
          global-json-file: global.json

      - name: Restore
        if: steps.solution.outputs.exists == 'true'
        run: dotnet restore MorseRunnerXPlat.slnx

      - name: Verify formatting
        if: steps.solution.outputs.exists == 'true' && matrix.os == 'ubuntu-latest'
        run: dotnet format MorseRunnerXPlat.slnx --verify-no-changes --no-restore

      - name: Build
        if: steps.solution.outputs.exists == 'true'
        run: dotnet build MorseRunnerXPlat.slnx --no-restore --configuration Release

      - name: Test
        if: steps.solution.outputs.exists == 'true'
        run: dotnet test --solution MorseRunnerXPlat.slnx --no-build --configuration Release
        env:
          MORSE_RUNNER_VISUAL_EVIDENCE_DIR: ${{ github.workspace }}/artifacts/visual/${{ matrix.os }}

      - name: Upload Avalonia visual evidence
        if: steps.solution.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: avalonia-visual-${{ matrix.os }}
          path: artifacts/visual/${{ matrix.os }}/*.png
          if-no-files-found: error
          retention-days: 14

      - name: Capture TUI native snapshot
        if: steps.solution.outputs.exists == 'true'
        shell: pwsh
        run: |
          $directory = '${{ github.workspace }}/artifacts/tui/${{ matrix.os }}'
          New-Item -ItemType Directory -Force -Path $directory | Out-Null
          foreach ($view in @('operator', 'settings', 'results', 'diagnostics', 'help')) {
            dotnet run --project src/MorseRunner.Tui/MorseRunner.Tui.csproj `
              --configuration Release --no-build -- `
              --snapshot --no-audio --no-color --snapshot-view $view |
              Out-File -LiteralPath "$directory/$view.txt" -Encoding utf8
          }

      - name: Upload TUI native evidence
        if: steps.solution.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tui-native-${{ matrix.os }}
          path: artifacts/tui/${{ matrix.os }}/*.txt
          if-no-files-found: error
          retention-days: 14

      - name: Check vulnerable packages
        if: steps.solution.outputs.exists == 'true' && matrix.os == 'ubuntu-latest'
        shell: pwsh
        run: |
          $output = dotnet list MorseRunnerXPlat.slnx package --vulnerable --include-transitive 2>&1 | Out-String
          Write-Host $output
          if ($output -match 'has the following vulnerable packages') {
            throw 'Vulnerable NuGet packages detected.'
          }
