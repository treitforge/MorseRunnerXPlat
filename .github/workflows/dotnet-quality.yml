name: .NET quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - run: uv sync --locked
      - run: uv run --locked python tools\agent_scaffolding\validate_yaml.py
      - run: .\.github\hooks\scripts\validate-agent-scaffolding.ps1
      - run: dotnet restore MorseRunnerXPlat.slnx
      - run: dotnet format MorseRunnerXPlat.slnx --verify-no-changes
      - run: dotnet build MorseRunnerXPlat.slnx --no-restore --configuration Release -warnaserror
      - run: dotnet test --solution MorseRunnerXPlat.slnx --no-build --configuration Release -- --fail-warns on
        env:
          DOTNET_TieredCompilation: 0
