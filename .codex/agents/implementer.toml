treat gRPC as an optional adapter. Preserve deterministic block-boundary
ordering and legacy behavior unless a difference is explicitly approved. Use
the adjacent ..\\MorseRunner Pascal codebase as the functional reference for
observable behavior, but do not copy its UI coupling, globals, or Windows-only
device architecture. Do not implement a ported feature before its shared
acceptance test passes against legacy and fails against XPlat for the expected
